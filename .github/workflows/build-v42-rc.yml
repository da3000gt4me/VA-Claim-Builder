name: Build VA Claim Builder 4.2 RC

on:
  workflow_dispatch:
    inputs:
      publish_prerelease:
        description: Attach successful artifacts to a GitHub prerelease
        required: false
        type: boolean
        default: false
      tag_name:
        description: Prerelease tag used only when publishing (for example v4.2.0-rc3)
        required: false
        type: string
        default: v4.2.0-rc6
  push:
    branches:
      - feature-v4.2-rc6-ocr-structured-extraction
    tags:
      - "v4.2.0-rc*"
  pull_request:
    branches:
      - feature-v4.2-phase1-increment1

permissions:
  contents: read

jobs:
  macos-arm64:
    name: macOS Apple Silicon arm64
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: arm64
          cache: pip
          cache-dependency-path: va_claim_builder_v4/requirements-packaging.txt
      - name: Install runtime and packaging dependencies
        working-directory: va_claim_builder_v4
        run: python -m pip install -r requirements-packaging.txt
      - name: Install local OCR engine
        run: brew install tesseract
      - name: Verify clean Windows packaging dependencies
        working-directory: va_claim_builder_v4
        run: python scripts/verify_packaging_dependencies.py --output dependency-preflight.json
      - name: Run RC6 tests
        working-directory: va_claim_builder_v4
        run: python -m pytest -q
      - name: Build ad hoc signed macOS bundle
        id: build
        working-directory: va_claim_builder_v4
        run: python scripts/build_release.py macos --clean --skip-tests --adhoc-sign --timeout 900
      - name: Run packaged macOS smoke test
        working-directory: va_claim_builder_v4
        run: >-
          python scripts/smoke_macos_bundle.py
          "dist/release/VAClaimBuilder-4.2.0-RC6-macOS-arm64/VA Claim Builder.app"
          --timeout 180
          --output "dist/release/VAClaimBuilder-4.2.0-RC6-macOS-arm64/packaged-smoke-result.json"
          --extraction-output "dist/release/VAClaimBuilder-4.2.0-RC6-macOS-arm64/extraction-smoke-result.json"
      - name: Record macOS OCR engine
        working-directory: va_claim_builder_v4
        run: tesseract --version > "dist/release/VAClaimBuilder-4.2.0-RC6-macOS-arm64/ocr-engine-report.txt" 2>&1
      - name: Verify macOS outputs and checksums
        working-directory: va_claim_builder_v4
        shell: bash
        run: |
          set -euo pipefail
          release="dist/release/VAClaimBuilder-4.2.0-RC6-macOS-arm64"
          test -d "$release/VA Claim Builder.app"
          test -f "$release/VA Claim Builder-4.2.0-RC6-arm64.zip"
          for file in SHA256SUMS.txt release-manifest.json build.log dependency-versions.json packaged-smoke-result.json extraction-smoke-result.json ocr-engine-report.txt; do test -f "$release/$file"; done
          python scripts/finalize_release_artifacts.py "$release"
          (cd "$release" && shasum -a 256 -c SHA256SUMS.txt)
      - name: Write macOS workflow summary
        working-directory: va_claim_builder_v4
        shell: bash
        run: |
          release="dist/release/VAClaimBuilder-4.2.0-RC6-macOS-arm64"
          build_seconds=$(python -c "import json; print(json.load(open('$release/release-manifest.json'))['build_seconds'])")
          smoke=$(python -c "import json; print('PASS' if json.load(open('$release/release-manifest.json'))['packaged_smoke_test']['passed'] else 'FAIL')")
          {
            echo "## VA-Claim-Builder-4.2.0-RC6-macOS-arm64"
            echo '```text'
            find "$release" -maxdepth 1 -type f -exec stat -f '%N | %z bytes' {} \; | sort
            echo
            cat "$release/SHA256SUMS.txt"
            echo '```'
            echo "Build duration: $build_seconds seconds"
            echo "Smoke test: $smoke"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload persistent macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VA-Claim-Builder-4.2.0-RC6-macOS-arm64
          path: va_claim_builder_v4/dist/release/VAClaimBuilder-4.2.0-RC6-macOS-arm64/
          if-no-files-found: error
          retention-days: 30

  windows-x64:
    name: Windows x86_64
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Install local OCR engine
        shell: pwsh
        run: |
          choco install tesseract -y
          "C:\Program Files\Tesseract-OCR" >> $env:GITHUB_PATH
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
          cache-dependency-path: va_claim_builder_v4/requirements-packaging.txt
      - name: Install runtime and packaging dependencies
        working-directory: va_claim_builder_v4
        run: python -m pip install -r requirements-packaging.txt
      - name: Run RC6 tests
        working-directory: va_claim_builder_v4
        run: python -m pytest -q
      - name: Build Windows portable application
        working-directory: va_claim_builder_v4
        run: >-
          python scripts/build_release.py windows --clean --skip-tests --diagnostic --timeout 900
          --release-version 4.2.0rc6 --display-version "4.2.0 RC6"
      - name: Inventory frozen NumPy runtime
        working-directory: va_claim_builder_v4
        run: >-
          python scripts/inspect_packaged_numpy.py
          "dist/release/VAClaimBuilder-4.2.0-RC6-Windows-x64/VAClaimBuilder"
          --output "dist/release/VAClaimBuilder-4.2.0-RC6-Windows-x64/numpy-bundle-inventory.json"
      - name: Run packaged Windows smoke test
        working-directory: va_claim_builder_v4
        run: >-
          python scripts/smoke_macos_bundle.py
          "dist/release/VAClaimBuilder-4.2.0-RC6-Windows-x64/VAClaimBuilder"
          --timeout 180
          --output "dist/release/VAClaimBuilder-4.2.0-RC6-Windows-x64/packaged-smoke-result.json"
          --extraction-output "dist/release/VAClaimBuilder-4.2.0-RC6-Windows-x64/extraction-smoke-result.json"
      - name: Record Windows OCR engine
        working-directory: va_claim_builder_v4
        shell: pwsh
        run: tesseract --version 2>&1 | Out-File "dist/release/VAClaimBuilder-4.2.0-RC6-Windows-x64/ocr-engine-report.txt"
      - name: Build Windows installer and refresh release checksums
        working-directory: va_claim_builder_v4
        shell: pwsh
        run: |
          $release = (Resolve-Path "dist/release/VAClaimBuilder-4.2.0-RC6-Windows-x64").Path
          $source = Join-Path $release "VAClaimBuilder"
          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $compiler "/DMySourceDir=$source" "/DMyOutputDir=$release" "packaging\windows\installer.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with exit code $LASTEXITCODE" }
          python scripts/finalize_release_artifacts.py $release
      - name: Verify Windows outputs and checksums
        working-directory: va_claim_builder_v4
        shell: pwsh
        run: |
          $release = "dist/release/VAClaimBuilder-4.2.0-RC6-Windows-x64"
          $required = @(
            "$release/VAClaimBuilder/VAClaimBuilder.exe",
            "$release/VA Claim Builder-4.2.0-RC6-Windows-x64.zip",
            "$release/VA_Claim_Builder_4.2.0_RC6_Windows_x64_Setup.exe",
            "$release/SHA256SUMS.txt", "$release/release-manifest.json", "$release/build.log",
            "$release/dependency-versions.json", "$release/packaged-smoke-result.json",
            "$release/extraction-smoke-result.json", "$release/ocr-engine-report.txt"
          )
          foreach ($path in $required) { if (-not (Test-Path $path)) { throw "Missing required output: $path" } }
          foreach ($line in Get-Content "$release/SHA256SUMS.txt") {
            $expected, $name = $line -split '\s+', 2
            $actual = (Get-FileHash -Algorithm SHA256 (Join-Path $release $name.Trim())).Hash.ToLowerInvariant()
            if ($actual -ne $expected) { throw "Checksum mismatch: $name" }
          }
      - name: Write Windows workflow summary
        working-directory: va_claim_builder_v4
        shell: pwsh
        run: |
          $release = "dist/release/VAClaimBuilder-4.2.0-RC6-Windows-x64"
          "## VA-Claim-Builder-4.2.0-RC6-Windows-x64" >> $env:GITHUB_STEP_SUMMARY
          '```text' >> $env:GITHUB_STEP_SUMMARY
          Get-ChildItem $release -File | Sort-Object Name | ForEach-Object { "$($_.Name) | $($_.Length) bytes" } >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          Get-Content "$release/SHA256SUMS.txt" >> $env:GITHUB_STEP_SUMMARY
          '```' >> $env:GITHUB_STEP_SUMMARY
          $manifest = Get-Content "$release/release-manifest.json" | ConvertFrom-Json
          "Build duration: $($manifest.build_seconds) seconds" >> $env:GITHUB_STEP_SUMMARY
          "Smoke test: $(if ($manifest.packaged_smoke_test.passed) {'PASS'} else {'FAIL'})" >> $env:GITHUB_STEP_SUMMARY
      - name: Upload persistent Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VA-Claim-Builder-4.2.0-RC6-Windows-x64
          path: va_claim_builder_v4/dist/release/VAClaimBuilder-4.2.0-RC6-Windows-x64/
          if-no-files-found: error
          retention-days: 30

  publish-prerelease:
    name: Optional GitHub prerelease
    if: github.event_name == 'workflow_dispatch' && inputs.publish_prerelease
    needs: [macos-arm64, windows-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: VA-Claim-Builder-4.2.0-RC*
          path: release-assets
          merge-multiple: true
      - name: Publish explicit prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: >-
          gh release create "$TAG_NAME" release-assets/*
          --repo "$GITHUB_REPOSITORY" --prerelease
          --title "VA Claim Builder 4.2.0 RC6"
          --notes "Release-candidate artifacts built and smoke-tested by GitHub Actions. Not a final production release."
